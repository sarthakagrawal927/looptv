name: Update Catalog

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          pip install -q yt-dlp
          npm install

      - name: Fetch latest videos
        run: bash scripts/build-catalog.sh

      - name: Tag new videos via AI gateway
        env:
          FAGW_API_KEY: ${{ secrets.FAGW_API_KEY }}
        run: node scripts/tag-videos.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --stat public/catalog.json
          echo "changed=$(git diff --name-only public/catalog.json | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/catalog.json
          NEW_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('public/catalog.json','utf8')); console.log(Object.values(d.stations).reduce((s,st) => s + st.videos.length, 0))")
          git commit -m "Update catalog: ${NEW_COUNT} videos

          Automated weekly catalog refresh.
          "
          git push
