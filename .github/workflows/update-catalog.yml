name: Update Catalog

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache Python deps (transformers + torch are large)
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ner-${{ hashFiles('requirements-ner.txt') }}
          restore-keys: pip-ner-

      # Cache HuggingFace model
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bert-base-ner

      - name: Install dependencies
        run: |
          pip install -q yt-dlp transformers torch
          npm install

      - name: Fetch latest videos
        run: bash scripts/build-catalog.sh

      - name: Run NER on new videos
        env:
          TOKENIZERS_PARALLELISM: "false"
        run: python3 scripts/extract-tags.py

      - name: Check for changes
        id: diff
        run: |
          git diff --stat public/catalog.json
          echo "changed=$(git diff --name-only public/catalog.json | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/catalog.json
          NEW_COUNT=$(python3 -c "import json; d=json.load(open('public/catalog.json')); print(sum(len(s['videos']) for s in d['stations'].values()))")
          git commit -m "Update catalog: ${NEW_COUNT} videos

          Automated weekly catalog refresh.
          "
          git push
