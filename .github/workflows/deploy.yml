name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'scripts/**'
      - 'channels.config.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'requirements-ner.txt'
      - 'stations.json'
      - 'tailwind.config.*'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'wrangler.toml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'scripts/**'
      - 'channels.config.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'requirements-ner.txt'
      - 'stations.json'
      - 'tailwind.config.*'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'wrangler.toml'

jobs:
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy out --project-name=looptv --branch=main --commit-dirty=true
      - name: Smoke production
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 https://looptv.pages.dev

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy out --project-name=looptv --branch=pr-${{ github.event.number }} --commit-dirty=true
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview: https://pr-${{ github.event.number }}.looptv.pages.dev`
            })
