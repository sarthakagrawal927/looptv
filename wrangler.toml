name = "looptv"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 1000, period = 60 }

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_SAASMAKER_API_KEY = "pk_07f1e1107e55807befc5def444a422f34b4310ee7c07c392"
